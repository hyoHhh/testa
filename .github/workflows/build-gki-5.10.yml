name: Build GKI Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: 'AOSP 内核分支'
        required: true
        default: 'common-android13-5.15'   # 推荐使用此分支，已验证包含 build 项目
      build_config:
        description: '构建配置文件'
        required: true
        default: 'gki_defconfig'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git ccache make flex bison bc \
            libssl-dev device-tree-compiler python3 python3-pip repo

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Sync kernel source
        run: |
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b ${{ github.event.inputs.kernel_branch }} --depth=1
          repo sync -c -j$(nproc)

      # 调试：检查目录结构（可选，构建成功后可以注释掉）
      - name: Debug directory structure
        run: |
          echo "=== Root ==="
          ls -la
          echo "=== build/ ==="
          ls -la build/ || echo "build/ NOT FOUND"
          echo "=== common/ ==="
          ls -la common/ || echo "common/ NOT FOUND"

      # 如果某个分支未自动包含 build 项目，则手动获取（健壮性补充）
      - name: Fetch build tools if missing
        run: |
          if [ ! -d build ]; then
            echo "build/ missing, cloning kernel/build..."
            git clone https://android.googlesource.com/kernel/build build
            cd build
            # 尝试切换到与内核相同的分支，失败则保持默认
            git checkout ${{ github.event.inputs.kernel_branch }} 2>/dev/null || true
            cd ..
          fi

      - name: Build kernel
        run: |
          # 注意：在根目录执行，不需要 cd common
          BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh

      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gki-kernel-${{ github.event.inputs.kernel_branch }}
          path: |
            out/android13-5.15/dist/Image
            out/android13-5.15/dist/Image.lz4
            out/android13-5.15/dist/*.ko
            out/android13-5.15/dist/vmlinux
