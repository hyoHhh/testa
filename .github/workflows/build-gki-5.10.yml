name: Build GKI 5.10 Kernel

on:
  # 允许从 GitHub Actions 界面手动触发工作流
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: 'AOSP 内核分支 (例如: android12-5.10, android13-5.10)'
        required: true
        default: 'android12-5.10'
      build_config:
        description: '构建配置文件 (例如: gki_defconfig, gki_dist)'
        required: true
        default: 'gki_defconfig'

jobs:
  build:
    name: Build GKI Kernel
    # 使用 Ubuntu 22.04 作为构建环境，这是 GKI 构建的常用选择
    runs-on: ubuntu-22.04

    steps:
      # Step 1: 最大化构建可用空间
      # GKI 内核源码和编译产物较大，此步骤可清理 GitHub 运行器上不必要的文件以释放空间
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      # Step 2: 安装必要的依赖
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git ccache make flex bison bc \
            libssl-dev device-tree-compiler python3 python3-pip
          # 安装 repo 工具，用于拉取 AOSP 内核源码
          sudo apt-get install -y repo

      # Step 3: 配置 Git
      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      # Step 4: 拉取 Android 通用内核 (ACK) 源码
      # 此步骤使用 repo 工具根据指定的分支（如 android12-5.10）同步内核源码[reference:6]
      - name: Sync kernel source
        run: |
          # 初始化并同步指定分支的通用内核
          repo init -u https://android.googlesource.com/kernel/manifest -b ${{ github.event.inputs.kernel_branch }} --depth=1
          repo sync -c -j$(nproc)

      # Step 5: 设置构建环境并编译内核
      # 使用 AOSP 提供的 build.sh 脚本进行编译。这是官方推荐的 GKI 构建方式[reference:7]
      - name: Build kernel
        run: |
          # 进入内核源码根目录
          cd common
          # 使用 build.sh 构建内核
          # BUILD_CONFIG 指定构建配置文件，对于 5.10 内核的 aarch64 架构，通常是 common/build.config.gki.aarch64[reference:8]
          BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh

      # Step 6: 上传编译产物 (Artifacts)
      # 将编译好的内核镜像（Image）和模块打包并上传，方便后续下载使用
      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gki-kernel-${{ github.event.inputs.kernel_branch }}
          path: |
            out/android12-5.10/dist/Image
            out/android12-5.10/dist/Image.lz4
            out/android12-5.10/dist/*.ko
            out/android12-5.10/dist/vmlinux
