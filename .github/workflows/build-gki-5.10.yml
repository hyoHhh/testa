name: Build GKI 5.10 Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: 'AOSP 内核分支'
        required: true
        default: 'android13-5.10'   # 修改为有效的分支
      build_config:
        description: '构建配置文件'
        required: true
        default: 'gki_defconfig'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git ccache make flex bison bc \
            libssl-dev device-tree-compiler python3 python3-pip repo

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Sync kernel source
        run: |
          repo init -u https://android.googlesource.com/kernel/manifest -b ${{ github.event.inputs.kernel_branch }} --depth=1
          repo sync -c -j$(nproc)

      # 调试：列出目录结构（可选）
      - name: Debug directory structure
        run: |
          echo "Root directory:"
          ls -la
          echo "Common directory:"
          ls -la common/ || echo "common/ not found"
          echo "Build script:"
          ls -la build/build.sh || echo "build/build.sh not found"

      - name: Build kernel
        run: |
          cd common
          # 如果 build/build.sh 不存在，尝试使用根目录的 build.sh
          if [ -f build/build.sh ]; then
            BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh
          else
            # 某些分支可能直接在 common 下有 build.sh，但这里保留错误提示
            echo "build/build.sh not found, check directory structure"
            exit 1
          fi

      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gki-kernel-${{ github.event.inputs.kernel_branch }}
          path: |
            out/android13-5.10/dist/Image
            out/android13-5.10/dist/Image.lz4
            out/android13-5.10/dist/*.ko
            out/android13-5.10/dist/vmlinux
